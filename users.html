<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Staff Controls</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="mobile-top-bar" class="md:hidden"></div>
    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 hidden md:flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <h2 class="text-base font-bold text-white tracking-wide">Staff Access Control Directory</h2>
                <div class="text-[11px] text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded font-medium border border-indigo-500/20">Administrative Node</div>
            </div>

            <div class="relative inline-block text-left z-50">
                <button id="profile-menu-button" onclick="toggleProfileDropdown(event)" class="flex items-center gap-2 bg-slate-800/80 hover:bg-slate-800 border border-slate-700/60 rounded-lg px-3 py-1.5 text-[11px] text-white transition font-medium cursor-pointer shadow-sm select-none">
                    <div id="header-profile-avatar" class="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] uppercase font-bold text-white overflow-hidden shrink-0 border border-indigo-400/30">
                        <i data-lucide="user" class="w-3 h-3"></i>
                    </div>
                    <span class="pointer-events-none">My profile</span>
                    <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400 pointer-events-none"></i>
                </button>

                <div id="profile-dropdown-menu" class="hidden absolute right-0 mt-2 w-48 rounded-lg bg-slate-800 border border-slate-700 shadow-xl py-1 text-[11px] z-50">
                    <div class="px-3 py-2 border-b border-slate-700/60 bg-slate-900/20">
                        <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Signed In As</p>
                        <p id="dropdown-user-email" class="text-slate-200 font-mono truncate mt-0.5">Guest Identity</p>
                    </div>
                    <button onclick="handleSystemSignOut()" class="w-full text-left px-3 py-2 text-rose-400 hover:bg-rose-500/10 flex items-center gap-2 cursor-pointer border-t border-slate-700/40 transition">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i> End Session
                    </button>
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6 overflow-y-auto flex-1 max-w-7xl w-full mx-auto">
            <section class="bg-slate-800 rounded-xl border border-slate-700/70 overflow-hidden shadow-sm">
                
                <div class="p-4 border-b border-slate-700/70 bg-slate-800/40 flex flex-col xl:flex-row gap-3 justify-between items-center">
                    <div class="flex items-center justify-between w-full xl:w-auto gap-4">
                        <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">Staff Controls</span>
                        <button onclick="toggleSort()" class="bg-slate-900 text-[11px] text-slate-300 px-2.5 py-1.5 border border-slate-700 rounded-lg hover:text-white flex items-center gap-1 cursor-pointer">
                            <i data-lucide="arrow-up-z-a" class="w-3.5 h-3.5"></i> Sort Name: A-Z (<span id="sort-indicator">Asc</span>)
                        </button>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-2 w-full xl:w-auto items-stretch sm:items-center">
                        <input id="search-input" oninput="filterStaff()" type="text" placeholder="Search staff members..." class="bg-slate-900 border border-slate-700 rounded-lg pl-3 pr-3 py-1.5 text-[11px] text-white focus:outline-none">
                        
                        <select id="filter-role" onchange="filterStaff()" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] text-slate-300 focus:outline-none cursor-pointer">
                            <option value="all">All Administrative Roles</option>
                            <option value="Admin">Admin Only</option>
                            <option value="Pastor">Pastors Only</option>
                            <option value="Creative Arts Leader">Creative Arts Leaders</option>
                        </select>

                        <button id="add-user-btn" onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-semibold py-1.5 px-3 rounded-lg transition flex items-center justify-center gap-1.5 cursor-pointer shadow hidden">
                            <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Add User
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700/60 bg-slate-900/30 text-[10px] uppercase tracking-wider text-slate-400">
                                <th class="py-2.5 px-4 w-[60px]">Avatar</th>
                                <th class="py-2.5 px-4">Staff Member Name</th>
                                <th class="py-2.5 px-4">Secure Log Email</th>
                                <th class="py-2.5 px-4">Assigned Portal Role</th>
                                <th id="table-actions-header" class="py-2.5 px-4 text-right hidden">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="staff-table-body" class="divide-y divide-slate-700/40 text-[11px] text-slate-300">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="add-staff-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-sm shadow-xl p-4 space-y-3 text-xs overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 id="modal-title" class="font-bold text-white text-sm flex items-center gap-1.5">
                    <i data-lucide="user-plus" class="text-indigo-400"></i> Provision Authorized Account
                </h3>
                <button type="button" onclick="closeModal()" class="text-slate-400 hover:text-white cursor-pointer"><i data-lucide="x"></i></button>
            </div>
            
            <form id="add-staff-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <input type="hidden" id="edit-id" value="">
                
                <div>
                    <label class="block text-slate-400 mb-0.5">Profile Photo</label>
                    <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-lg border border-slate-700">
                        <div id="image-preview-container" class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 overflow-hidden flex items-center justify-center">
                            <i data-lucide="user" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <input type="file" id="s-photo" accept="image/*" onchange="previewImage(event)" class="text-[11px] text-slate-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[11px] file:font-semibold file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700 file:cursor-pointer">
                    </div>
                </div>

                <div>
                    <label class="block text-slate-400 mb-0.5">Full Name</label>
                    <input type="text" id="s-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-slate-400 mb-0.5">Authentication Email Address</label>
                    <input type="email" id="s-email" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none">
                </div>

                <div id="password-field-wrapper">
                    <label class="block text-slate-400 mb-0.5">Account System Password</label>
                    <input type="password" id="s-password" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none" placeholder="Min 6 characters">
                </div>

                <div>
                    <label class="block text-slate-400 mb-0.5">Assigned Portal Role Mapping</label>
                    <select id="s-role" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none cursor-pointer">
                        <option value="Admin">Admin</option>
                        <option value="Pastor">Pastor</option>
                        <option value="Creative Arts Leader">Creative Arts Leader</option>
                    </select>
                </div>
                
                <div class="flex justify-end gap-2 pt-2 border-t border-slate-700">
                    <button type="button" onclick="closeModal()" class="bg-slate-700 px-3 py-1.5 rounded-lg cursor-pointer">Cancel</button>
                    <button type="submit" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-medium cursor-pointer">Save Credentials</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Your exact app Firebase Configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyDE7_LLpLeSgrnDwSOBo0gr2gqHQz_IUpE",
            authDomain: "glorious-church-app.firebaseapp.com",
            projectId: "glorious-church-app",
            storageBucket: "glorious-church-app.firebasestorage.app",
            messagingSenderId: "962372698082",
            appId: "1:962372698082:web:e8491be558c6421d1dc3bb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const staffCollection = db.collection('staff');

        let staffMembers = [];
        let sortAsc = true;
        let currentPhotoBase64 = "";
        let currentUserRole = ""; 

        document.addEventListener("DOMContentLoaded", () => { 
            // Kickstart security and authentication lifecycle instantly
            listenToAuthSession();

            // Clear profile flyout menus if clicked outside element frame
            document.addEventListener('click', function(e) {
                const dropMenu = document.getElementById("profile-dropdown-menu");
                const profileBtn = document.getElementById("profile-menu-button");
                
                if (dropMenu && profileBtn && !profileBtn.contains(e.target) && !dropMenu.contains(e.target)) {
                    dropMenu.classList.add("hidden");
                }
            });
        });

        // Verifies credentials via cloud database to assign proper user view states
        function listenToAuthSession() {
            // First pass: Build navigation with unknown role flags so the layout prints on-screen instantly
            buildSecuredNavigation();

            auth.onAuthStateChanged(user => {
                if (!user) {
                    currentUserRole = "";
                    // Route Guard: Send unauthenticated actions away to login page instantly
                    window.location.href = "login.html";
                    return;
                }

                // Verify user matches an operational account inside your Firestore database collection
                staffCollection.where("email", "==", user.email).get().then(snapshot => {
                    if (snapshot.empty) {
                        alert("Access Denied! You are not registered as an official staff member.");
                        auth.signOut().then(() => { window.location.href = "login.html"; });
                        return;
                    }

                    let userData = snapshot.docs[0].data();
                    currentUserRole = userData.role;

                    // Second pass: Re-run navigation builder to strip restricted sections now that role is confirmed
                    buildSecuredNavigation();

                    // Hide administrative buttons/columns from non-privileged views
                    applyRoleVisibilityRules();

                    const emailContainer = document.getElementById("dropdown-user-email");
                    const avatarContainer = document.getElementById("header-profile-avatar");
                    
                    if (emailContainer) emailContainer.innerText = user.email;
                    if (avatarContainer) {
                        if (userData.photo) {
                            avatarContainer.innerHTML = `<img src="${userData.photo}" class="w-full h-full object-cover">`;
                        } else {
                            avatarContainer.innerHTML = (userData.name || "S").charAt(0).toUpperCase();
                        }
                    }

                    // Synchronize dataset real-time table listeners
                    listenToStaffCloudData();

                }).catch(err => {
                    console.error("Authorization system error:", err);
                    window.location.href = "login.html";
                });
            });
        }

        function applyRoleVisibilityRules() {
            const addUserBtn = document.getElementById("add-user-btn");
            const actionsHeader = document.getElementById("table-actions-header");
            const normalizedRole = (currentUserRole || "").trim().toLowerCase();

            if (normalizedRole === "admin" || normalizedRole === "pastor") {
                if (addUserBtn) addUserBtn.classList.remove("hidden");
                if (actionsHeader) actionsHeader.classList.remove("hidden");
            } else {
                if (addUserBtn) addUserBtn.classList.add("hidden");
                if (actionsHeader) actionsHeader.classList.add("hidden");
            }
        }

        function toggleProfileDropdown(event) {
            if (event) event.stopPropagation();
            const dropMenu = document.getElementById("profile-dropdown-menu");
            if (dropMenu) dropMenu.classList.toggle("hidden");
        }

        function handleSystemSignOut() {
            const dropMenu = document.getElementById("profile-dropdown-menu");
            if (dropMenu) dropMenu.classList.add("hidden");

            if (confirm("Are you sure you want to log out and terminate this session?")) {
                auth.signOut().then(() => {
                    window.location.href = "login.html";
                });
            }
        }

        function listenToStaffCloudData() {
            staffCollection.onSnapshot(snapshot => {
                staffMembers = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id; 
                    staffMembers.push(data);
                });
                filterStaff();
            }, error => {
                console.error("Staff database snapshot sync error: ", error);
            });
        }

        function openAddModal() {
            document.getElementById("modal-title").innerHTML = `<i data-lucide="user-plus" class="text-indigo-400"></i> Provision Authorized Account`;
            document.getElementById("edit-id").value = "";
            document.getElementById("add-staff-form").reset();
            document.getElementById("s-email").disabled = false;
            document.getElementById("password-field-wrapper").classList.remove("hidden");
            document.getElementById("s-password").required = true;
            currentPhotoBase64 = "";
            document.getElementById("image-preview-container").innerHTML = `<i data-lucide="user" class="w-5 h-5 text-slate-500"></i>`;
            lucide.createIcons();
            document.getElementById("add-staff-modal").classList.remove("hidden");
        }

        function closeModal() { document.getElementById("add-staff-modal").classList.add("hidden"); }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhotoBase64 = e.target.result;
                    document.getElementById("image-preview-container").innerHTML = `<img src="${currentPhotoBase64}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(file);
            }
        }

        function renderTable(data) {
            const body = document.getElementById("staff-table-body"); 
            if (!body) return;
            body.innerHTML = "";
            
            const normalizedRole = (currentUserRole || "").trim().toLowerCase();
            const displayActions = (normalizedRole === "admin" || normalizedRole === "pastor") ? "" : "hidden";

            data.forEach((s) => {
                const avatarImg = s.photo 
                    ? `<img src="${s.photo}" class="w-7 h-7 rounded-full object-cover border border-slate-700">`
                    : `<div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-slate-300 font-bold uppercase">${(s.name || "S").charAt(0)}</div>`;

                let roleBadgeColor = "bg-indigo-500/10 text-indigo-400 border border-indigo-500/20";
                if (s.role === "Admin") roleBadgeColor = "bg-rose-500/10 text-rose-400 border border-rose-500/20";
                if (s.role === "Pastor") roleBadgeColor = "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";

                body.innerHTML += `
                <tr class="hover:bg-slate-700/20">
                    <td class="py-2 px-4">${avatarImg}</td>
                    <td class="py-2 px-4 font-semibold text-white">${s.name || "Unnamed"}</td>
                    <td class="py-2 px-4 font-mono text-slate-400">${s.email || "N/A"}</td>
                    <td class="py-2 px-4">
                        <span class="${roleBadgeColor} px-2 py-0.5 rounded text-[10px] font-medium">
                            ${s.role || "No Role Specified"}
                        </span>
                    </td>
                    <td class="py-2 px-4 text-right space-x-1 ${displayActions}">
                        <button type="button" onclick="editStaff('${s.id}')" class="text-indigo-400 hover:text-white p-1 rounded hover:bg-slate-700 transition cursor-pointer"><i data-lucide="edit-3" class="w-3.5 h-3.5 inline"></i></button>
                        <button type="button" onclick="deleteStaff('${s.id}')" class="text-rose-400 hover:text-rose-300 p-1 rounded hover:bg-slate-700 transition cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5 inline"></i></button>
                    </td>
                </tr>`;
            });
            lucide.createIcons();
        }

        function filterStaff() {
            const query = (document.getElementById("search-input").value || "").toLowerCase();
            const chosenRole = document.getElementById("filter-role").value;
            
            let filtered = staffMembers.filter(s => {
                const sName = (s.name || "").toLowerCase();
                const sEmail = (s.email || "").toLowerCase();
                
                const matchesSearch = sName.includes(query) || sEmail.includes(query);
                const matchesRole = (chosenRole === "all" || s.role === chosenRole);
                return matchesSearch && matchesRole;
            });
            
            filtered.sort((a,b) => sortAsc ? (a.name || "").localeCompare(b.name || "") : (b.name || "").localeCompare(a.name || ""));
            renderTable(filtered);
        }

        function toggleSort() { sortAsc = !sortAsc; document.getElementById("sort-indicator").innerText = sortAsc ? "Asc" : "Desc"; filterStaff(); }

        function editStaff(id) {
            const s = staffMembers.find(item => item.id === id);
            if(!s) return;

            document.getElementById("modal-title").innerHTML = `<i data-lucide="edit-3" class="text-indigo-400"></i> Modify Portal Designation`;
            document.getElementById("edit-id").value = id;
            document.getElementById("s-name").value = s.name || "";
            document.getElementById("s-email").value = s.email || "";
            document.getElementById("s-email").disabled = true; 
            document.getElementById("s-role").value = s.role || "Creative Arts Leader";
            
            document.getElementById("password-field-wrapper").classList.add("hidden");
            document.getElementById("s-password").required = false;

            currentPhotoBase64 = s.photo || "";
            if(s.photo) {
                document.getElementById("image-preview-container").innerHTML = `<img src="${s.photo}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById("image-preview-container").innerHTML = `<i data-lucide="user" class="w-5 h-5 text-slate-500"></i>`;
            }
            lucide.createIcons();
            document.getElementById("add-staff-modal").classList.remove("hidden");
        }

        function deleteStaff(id) {
            if(confirm("Are you sure you want to revoke this profile's administrative clearances?")) {
                staffCollection.doc(id).delete().catch(err => alert("Could not complete removal: " + err.message));
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const idValue = document.getElementById("edit-id").value;
            const targetEmail = document.getElementById("s-email").value;
            
            const dataPackage = {
                name: document.getElementById("s-name").value,
                email: targetEmail,
                role: document.getElementById("s-role").value,
                photo: currentPhotoBase64
            };

            if(idValue) {
                staffCollection.doc(idValue).update(dataPackage)
                .then(() => { closeModal(); e.target.reset(); })
                .catch(err => alert("Error updating registry: " + err.message));
            } else {
                const targetPass = document.getElementById("s-password").value;
                
                auth.createUserWithEmailAndPassword(targetEmail, targetPass)
                .then(() => {
                    return staffCollection.add(dataPackage);
                })
                .then(() => { 
                    closeModal(); 
                    e.target.reset(); 
                    alert("Account provisioned and synchronized into database registry successfully.");
                })
                .catch(err => alert("Failed to synchronize auth record: " + err.message));
            }
        }

        // PERFECTLY SYNCHRONIZED SECURED NAVIGATION BUILDER
        function buildSecuredNavigation() {
            fetch('index.html')
                .then(res => res.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    const mobileSource = doc.querySelector('.md\\:hidden');
                    const sidebarSource = doc.querySelector('aside');

                    if (!mobileSource || !sidebarSource) {
                        console.warn("Template elements missing inside index.html target fetch.");
                        return;
                    }

                    // Lowercase and trim user roles to prevent database formatting discrepancies completely
                    const normalizedRole = (currentUserRole || "").trim().toLowerCase();

                    // Security-Level Gate Check
                    if (normalizedRole === "Creative Arts Leader") {
                        const restrictedPages = ['users.html', 'offerings.html']; 

                        restrictedPages.forEach(page => {
                            const mobileLink = mobileSource.querySelector(`a[href="${page}"]`);
                            const sidebarLink = sidebarSource.querySelector(`a[href="${page}"]`);
                            
                            if (mobileLink) mobileLink.remove();
                            if (sidebarLink) sidebarLink.remove();
                        });
                    }

                    // Mount elements securely to screen container nodes
                    const mobileTopBar = document.getElementById('mobile-top-bar');
                    const container = document.getElementById('sidebar-container');

                    if (mobileTopBar) mobileTopBar.innerHTML = mobileSource.innerHTML;
                    
                    if (container) {
                        container.className = sidebarSource.className;
                        container.id = "sidebar-menu";
                        container.innerHTML = sidebarSource.innerHTML;
                        
                        // Set active layout highlighters perfectly
                        container.querySelectorAll('a').forEach(link => {
                            if (link.getAttribute('href') === 'users.html') {
                                link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
                            } else {
                                link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
                            }
                        });
                    }
                    
                    lucide.createIcons();
                })
                .catch(err => console.error("Error running application layout building processes: ", err));
        }
    </script>
    <script src="profile-global.js"></script>
</body>
</html>
