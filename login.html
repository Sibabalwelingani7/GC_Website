<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 border border-slate-700/70 p-6 rounded-2xl w-full max-w-sm shadow-xl space-y-4">
        
        <div class="text-center space-y-1">
            <div class="inline-flex p-3 bg-indigo-500/10 text-indigo-400 rounded-xl mb-2">
                <i data-lucide="church" class="w-8 h-8"></i>
            </div>
            <h1 class="text-lg font-bold text-white tracking-wide uppercase">The Glorious Church</h1>
            <p class="text-xs text-slate-400">Youth Service Portal</p>
        </div>
        
        <div class="space-y-3.5 text-xs">
            <div>
                <label class="block text-slate-400 font-medium mb-1">Email Address</label>
                <input type="email" id="email-field" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500" placeholder="admin@thegloriouschurch.org">
            </div>
            
            <div>
                <label class="block text-slate-400 font-medium mb-1">Password</label>
                <input type="password" id="pass-field" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-indigo-500" placeholder="••••••••">
            </div>
            
            <a href="./index.html" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg transition shadow-md text-sm text-center block mt-4 select-none">
                Sign In to Console
            </a>
        </div>
        
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
