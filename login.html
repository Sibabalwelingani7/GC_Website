<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- The Title -->
    <title>The Glorious Church - Portal Login Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 border border-slate-700/70 rounded-xl w-full max-w-sm shadow-xl p-6 space-y-4 text-xs">
        <div class="text-center space-y-1">
            <h2 class="text-lg font-bold text-white tracking-wide">The Glorious Church</h2>
            <p class="text-slate-400">Management Roster Authentication Node</p>
        </div>

        <div id="error-alert" class="hidden bg-rose-500/10 border border-rose-500/20 text-rose-400 p-2.5 rounded-lg font-medium flex items-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
            <span id="error-message">Invalid authentication credentials.</span>
        </div>

        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-3">
            <div>
                <label class="block text-slate-400 mb-1 font-medium">Secure Log Email</label>
                <div class="relative">
                    <input type="email" id="login-email" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none" placeholder="name@thegloriouschurch.org">
                </div>
            </div>

            <div>
                <label class="block text-slate-400 mb-1 font-medium">Portal Password</label>
                <div class="relative">
                    <input type="password" id="login-password" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 px-4 rounded-lg transition flex items-center justify-center gap-2 cursor-pointer shadow mt-4 text-xs">
                <i data-lucide="log-in" class="w-3.5 h-3.5"></i> Sign In to Portal
            </button>
        </form>
    </div>

    <script>
        // Your exact app Firebase Configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyDE7_LLpLeSgrnDwSOBo0gr2gqHQz_IUpE",
            authDomain: "glorious-church-app.firebaseapp.com",
            projectId: "glorious-church-app",
            storageBucket: "glorious-church-app.firebasestorage.app",
            messagingSenderId: "962372698082",
            appId: "1:962372698082:web:e8491be558c6421d1dc3bb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Initialize Lucide icons on view load
        lucide.createIcons();

        function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            const errorAlert = document.getElementById("error-alert");
            const errorMessage = document.getElementById("error-message");
            const submitBtn = document.getElementById("submit-btn");

            // Clear previous errors and set button to loading state
            errorAlert.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerText = "Verifying Identity...";

            // Step 1: Check Firebase Auth to see if password matches the email
            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    const user = userCredential.user;

                    // Step 2: Double check against your Firestore 'staff' collection 
                    // to make sure this user is explicitly allowed on the dashboard.
                    return db.collection('staff').where("email", "==", user.email).get();
                })
                .then((snapshot) => {
                    if (snapshot.empty) {
                        // If they are in Firebase Auth but NOT in your staff collection database, kick them out
                        throw new Error("Access Denied. Your email is not registered in the staff database.");
                    }

                    // Logged in successfully and verified as staff member! Redirect to index/members
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    // ERROR HANDLING: Catch bad passwords, unregistered emails, or network errors
                    console.error("Authentication Failure: ", error);
                    
                    // Show user-friendly error messages on the screen
                    errorAlert.classList.remove("hidden");
                    if (error.code === "auth/invalid-credential" || error.code === "auth/user-not-found" || error.code === "auth/wrong-password") {
                        errorMessage.innerText = "Invalid email address or password configuration.";
                    } else {
                        errorMessage.innerText = error.message;
                    }

                    // Reset button back to normal state
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `<i data-lucide="log-in" class="w-3.5 h-3.5"></i> Sign In to Portal`;
                    lucide.createIcons();
                    
                    // Force complete signout out of Firebase system to clear any partial sessions
                    auth.signOut();
                });
        }
    </script>
</body>
</html>
