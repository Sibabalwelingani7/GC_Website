<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Offerings Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="mobile-top-bar" class="md:hidden shrink-0"></div>
    
    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden relative bg-[#0d1321]">
        <header class="bg-[#0d1321] border-b border-slate-900 px-6 py-4 hidden md:flex justify-between items-center shrink-0">
            <h2 class="text-base font-bold text-white tracking-wide">Financial Offerings Tracker</h2>
            <button onclick="openOfferingsModal()" class="bg-emerald-600 hover:bg-emerald-500 text-xs text-white px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 cursor-pointer shadow">
                <i data-lucide="plus-circle" class="w-4 h-4"></i> Log Service Collection
            </button>
        </header>

        <main class="p-4 md:p-6 overflow-y-auto flex-1 max-w-4xl w-full mx-auto">
            
            <div class="grid grid-cols-2 gap-4 mb-5 text-xs">
                <div class="bg-[#131b2e] border border-slate-900 p-4 rounded-xl shadow-sm">
                    <p class="text-slate-400 font-medium uppercase tracking-wider text-[10px]">Total Collections Stored</p>
                    <h3 id="stat-total-amount" class="text-xl font-bold text-emerald-400 mt-1">R 0.00</h3>
                </div>
                <div class="bg-[#131b2e] border border-slate-900 p-4 rounded-xl shadow-sm">
                    <p class="text-slate-400 font-medium uppercase tracking-wider text-[10px]">Average Offering Collection</p>
                    <h3 id="stat-avg-amount" class="text-xl font-bold text-indigo-400 mt-1">R 0.00</h3>
                </div>
            </div>

            <section class="bg-[#131b2e] rounded-xl border border-slate-900 overflow-hidden shadow-sm">
                <div class="p-4 border-b border-slate-900 bg-slate-800/20 flex justify-between items-center">
                    <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">Offerings Registry Record Book</span>
                    <span class="text-[10px] text-slate-400 font-medium" id="record-count-badge">0 logs saved</span>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-900 bg-slate-950/20 text-[10px] uppercase tracking-wider text-slate-400">
                                <th class="py-3 px-5">Collection Date</th>
                                <th class="py-3 px-5">Amount Gathered</th>
                                <th class="py-3 px-5 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="offerings-table-body" class="divide-y divide-slate-900/60 text-[11px] text-slate-300">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="offerings-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 rounded-xl w-full max-w-sm p-4 space-y-4 text-xs shadow-2xl animate-in fade-in zoom-in-95 duration-150">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 class="font-bold text-white text-sm flex items-center gap-1.5">
                    <i data-lucide="coins" class="text-emerald-400 w-4 h-4"></i> Record Service Offerings
                </h3>
                <button onclick="closeOfferingsModal()" class="text-slate-400 hover:text-white cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <form onsubmit="handleNewOffering(event)" class="space-y-3.5">
                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Service Metric Collection Date</label>
                    <input type="date" id="off-date" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-white focus:outline-none focus:border-emerald-500 font-sans">
                </div>
                
                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Total Offerings Received (ZAR)</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-3 text-slate-500 font-bold font-sans">R</span>
                        <input type="number" id="off-amount" min="0" step="0.01" placeholder="0.00" required class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 pl-7 text-white focus:outline-none focus:border-emerald-500 tracking-wide font-mono font-medium">
                    </div>
                </div>
                
                <div class="flex justify-end gap-2 pt-2 border-t border-slate-800">
                    <button type="button" onclick="closeOfferingsModal()" class="bg-slate-800 text-slate-200 px-3 py-1.5 rounded-lg font-medium cursor-pointer transition hover:bg-slate-700">Cancel</button>
                    <button type="submit" class="bg-emerald-600 text-white px-3 py-1.5 rounded-lg font-semibold cursor-pointer transition hover:bg-emerald-500 shadow-md">Save Collection</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE7_LLpLeSgrnDwSOBo0gr2gqHQz_IUpE",
            authDomain: "glorious-church-app.firebaseapp.com",
            projectId: "glorious-church-app",
            storageBucket: "glorious-church-app.firebasestorage.app",
            messagingSenderId: "962372698082",
            appId: "1:962372698082:web:e8491be558c6421d1dc3bb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const staffCollection = db.collection('staff');
        const offeringsCollection = db.collection('offerings'); // Linked to Cloud Firestore

        let offeringsLogs = [];
        let currentUserRole = "";

        document.addEventListener("DOMContentLoaded", () => {
            listenToAuthSession();
            listenToOfferingsCloudData();
        });

        function listenToAuthSession() {
            buildSecuredNavigation();

            auth.onAuthStateChanged(user => {
                if (user) {
                    staffCollection.where("email", "==", user.email).get().then(staffSnapshot => {
                        if (staffSnapshot.empty) {
                            alert("Access Denied! Your email is not registered in the staff database registry.");
                            auth.signOut().then(() => { window.location.href = "login.html"; });
                            return;
                        }

                        let staffData = staffSnapshot.docs[0].data();
                        currentUserRole = staffData.role;

                        const roleIndicator = document.getElementById("sidebar-role-indicator");
                        if (roleIndicator) roleIndicator.innerText = currentUserRole;

                        buildSecuredNavigation();
                    }).catch(err => {
                        console.error("Authorization snapshot look up failure:", err);
                        window.location.href = "login.html";
                    });
                } else {
                    currentUserRole = "";
                    window.location.href = "login.html";
                }
            });
        }

        // Live Firestore Collection Listener Replacement
        function listenToOfferingsCloudData() {
            offeringsCollection.onSnapshot(snapshot => {
                offeringsLogs = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id; // Store Cloud Doc ID for explicit deletions
                    offeringsLogs.push(data);
                });
                refreshOfferingsDisplay();
            }, err => console.error("Firestore Loading Error: ", err));
        }

        function toggleMobileMenu() {
            const menu = document.getElementById("sidebar-menu");
            if (menu) {
                menu.classList.toggle("-translate-x-full");
            }
        }

        function toggleProfileDropdown(event) {
            if (event) event.stopPropagation();
            alert("To update accounts, modify profile values inside primary member or user controls.");
        }

        function openOfferingsModal() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById("off-date").value = today;
            document.getElementById("off-amount").value = "";
            document.getElementById("offerings-modal").classList.remove("hidden");
        }

        function closeOfferingsModal() {
            document.getElementById("offerings-modal").classList.add("hidden");
        }

        function handleNewOffering(e) {
            e.preventDefault();
            const rawDate = document.getElementById("off-date").value;
            const rawAmount = parseFloat(document.getElementById("off-amount").value);

            if (!rawDate || isNaN(rawAmount)) return;

            // Add straight into Cloud Database Collection
            offeringsCollection.add({
                date: rawDate,
                amount: rawAmount,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                closeOfferingsModal();
            })
            .catch(err => alert("Failed to log offering to database: " + err.message));
        }

        function deleteOfferingRecord(id) {
            if(confirm("Are you sure you want to delete this selected offering record entry from the cloud database?")) {
                offeringsCollection.doc(id).delete()
                    .catch(err => alert("Cloud deletion error: " + err.message));
            }
        }

        function formatZAR(val) {
            return 'R ' + val.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
        }

        function formatChurchDate(inputString) {
            const dateObj = new Date(inputString);
            if(isNaN(dateObj)) return inputString;
            return dateObj.toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function refreshOfferingsDisplay() {
            const body = document.getElementById("offerings-table-body");
            if (!body) return;
            body.innerHTML = "";

            // Sort newest collection statements first
            offeringsLogs.sort((a, b) => new Date(b.date) - new Date(a.date));

            let cumulativeTotal = 0;

            offeringsLogs.forEach(entry => {
                cumulativeTotal += entry.amount;

                body.innerHTML += `
                <tr class="hover:bg-slate-900/40 transition-colors">
                    <td class="py-3 px-5 font-medium text-white">${formatChurchDate(entry.date)}</td>
                    <td class="py-3 px-5">
                        <span class="text-emerald-400 font-bold font-mono text-xs">
                            ${formatZAR(entry.amount)}
                        </span>
                    </td>
                    <td class="py-3 px-5 text-right">
                        <button onclick="deleteOfferingRecord('${entry.id}')" class="text-slate-500 hover:text-rose-400 p-1 rounded hover:bg-slate-900/50 transition cursor-pointer" title="Delete Log Statement">
                            <i data-lucide="trash-2" class="w-4 h-4 inline"></i>
                        </button>
                    </td>
                </tr>`;
            });

            if(offeringsLogs.length === 0) {
                body.innerHTML = `<tr><td colspan="3" class="text-center py-6 text-slate-500 font-medium">No recorded financial collection logs inside ledger records yet.</td></tr>`;
            }

            const dynamicAverage = offeringsLogs.length > 0 ? (cumulativeTotal / offeringsLogs.length) : 0;
            
            const totalEl = document.getElementById("stat-total-amount");
            const avgEl = document.getElementById("stat-avg-amount");
            const badgeEl = document.getElementById("record-count-badge");

            if(totalEl) totalEl.innerText = formatZAR(cumulativeTotal);
            if(avgEl) avgEl.innerText = formatZAR(dynamicAverage);
            if(badgeEl) badgeEl.innerText = `${offeringsLogs.length} logs saved`;

            lucide.createIcons();
        }

        function buildSecuredNavigation() {
            fetch('index.html').then(res => res.text()).then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const mobileSource = doc.querySelector('.md\\:hidden');
                const sidebarSource = doc.getElementById('sidebar-menu') || doc.querySelector('aside');

                if (!sidebarSource || !mobileSource) return;

                if (currentUserRole === "Creative Arts Leader") {
                    const restrictedPages = ['users.html', 'offerings.html']; 
                    restrictedPages.forEach(page => {
                        const mobileLink = mobileSource.querySelector(`a[href="${page}"]`);
                        const sidebarLink = sidebarSource.querySelector(`a[href="${page}"]`);
                        if (mobileLink) mobileLink.remove();
                        if (sidebarLink) sidebarLink.remove();
                    });
                }

                const mobileTopBar = document.getElementById('mobile-top-bar');
                if (mobileTopBar) {
                    mobileTopBar.className = mobileSource.className;
                    mobileTopBar.innerHTML = mobileSource.innerHTML;
                }
                
                const container = document.getElementById('sidebar-container');
                if (container) {
                    container.className = sidebarSource.className;
                    container.id = "sidebar-menu";
                    container.innerHTML = sidebarSource.innerHTML;
                    
                    container.querySelectorAll('a').forEach(link => {
                        if (link.getAttribute('href') === 'offerings.html') {
                            link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
                        } else {
                            link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
                        }
                    });
                }
                
                const roleIndicator = document.getElementById("sidebar-role-indicator");
                if (roleIndicator && currentUserRole) roleIndicator.innerText = currentUserRole;

                lucide.createIcons();
            }).catch(err => console.error("Error running template rendering system:", err));
        }
    </script>
    <script src="profile-global.js"></script>
</body>
</html>
