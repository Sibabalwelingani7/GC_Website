<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Offerings Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex overflow-hidden">

    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center shrink-0">
            <h2 class="text-base font-bold text-white tracking-wide">Youth Financial Collection Ledger</h2>
            <button class="bg-indigo-600 hover:bg-indigo-500 text-xs text-white px-3 py-1.5 rounded-lg transition font-medium cursor-pointer flex items-center gap-1.5"><i data-lucide="plus-circle"></i> Log Service Collection</button>
        </header>

        <main class="p-6 overflow-y-auto flex-1 max-w-6xl w-full mx-auto space-y-4">
            <div class="bg-slate-800 rounded-xl border border-slate-700/70 overflow-hidden shadow-sm">
                <div class="p-4 border-b border-slate-700/70 bg-slate-800/40 text-xs font-bold uppercase tracking-wider text-slate-300">Financial Audit Logs</div>
                <div class="overflow-x-auto text-xs">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700/60 bg-slate-900/30 text-[10px] uppercase tracking-wider text-slate-400">
                                <th class="py-2.5 px-4">Financial Service Date Anchor</th>
                                <th class="py-2.5 px-4">Collection Type Tier</th>
                                <th class="py-2.5 px-4">Total Amount Audited</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-700/40 text-slate-300">
                            <tr class="hover:bg-slate-700/20"><td class="py-3 px-4 font-semibold text-white">Sunday, June 7, 2026</td><td class="py-3 px-4 text-slate-400">Youth Service Offering Collection</td><td class="py-3 px-4 text-emerald-400 font-bold">R1,450.00</td></tr>
                            <tr class="hover:bg-slate-700/20"><td class="py-3 px-4 font-semibold text-white">Sunday, May 31, 2026</td><td class="py-3 px-4 text-slate-400">Youth Service Offering Collection</td><td class="py-3 px-4 text-emerald-400 font-bold">R1,240.00</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        fetch('index.html').then(res => res.text()).then(html => {
            const container = document.getElementById('sidebar-container');
            container.className = "w-64 bg-slate-950 border-r border-slate-800 h-screen sticky top-0 left-0 z-40 flex flex-col justify-between shrink-0";
            container.innerHTML = new DOMParser().parseFromString(html, 'text/html').querySelector('aside').innerHTML;
            container.querySelector('a[href="index.html"]').className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
            container.querySelector('a[href="offerings.html"]').className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
            lucide.createIcons();
        });
    </script>
</body>
</html>
