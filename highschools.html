<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - High Schools</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="mobile-top-bar" class="md:hidden"></div>
    <aside id="sidebar-container"></aside>

    <input type="file" id="global-school-file-picker" accept="image/*" class="hidden" onchange="handleInlineSchoolPhoto(event)">

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 hidden md:flex justify-between items-center shrink-0">
            <h2 class="text-base font-bold text-white tracking-wide">High Schools Allocation Roster</h2>
            
            <div class="flex items-center gap-4">
                <button onclick="openSchoolModal()" class="bg-indigo-600 hover:bg-indigo-500 text-xs text-white px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 cursor-pointer shadow">
                    <i data-lucide="plus"></i> Add High School
                </button>

                <div class="relative inline-block text-left z-50">
                    <button id="profile-menu-button" onclick="toggleProfileDropdown(event)" class="flex items-center gap-2 bg-slate-800/80 hover:bg-slate-800 border border-slate-700/60 rounded-lg px-3 py-1.5 text-[11px] text-white transition font-medium cursor-pointer shadow-sm select-none">
                        <div id="header-profile-avatar" class="w-5 h-5 rounded-full bg-indigo-600 flex items-center justify-center text-[10px] uppercase font-bold text-white overflow-hidden shrink-0 border border-indigo-400/30">
                            <i data-lucide="user" class="w-3 h-3"></i>
                        </div>
                        <span class="pointer-events-none">My profile</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400 pointer-events-none"></i>
                    </button>

                    <div id="profile-dropdown-menu" class="hidden absolute right-0 mt-2 w-48 rounded-lg bg-slate-800 border border-slate-700 shadow-xl py-1 text-[11px] z-50">
                        <div class="px-3 py-2 border-b border-slate-700/60 bg-slate-900/20">
                            <p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Signed In As</p>
                            <p id="dropdown-user-email" class="text-slate-200 font-mono truncate mt-0.5">Guest Identity</p>
                        </div>
                        <button onclick="showCurrentUserProfile()" class="w-full text-left px-3 py-2 text-slate-300 hover:bg-slate-700/50 hover:text-white flex items-center gap-2 cursor-pointer transition">
                            <i data-lucide="user-check" class="w-3.5 h-3.5 text-indigo-400"></i> Account Settings
                        </button>
                        <button onclick="handleSystemSignOut()" class="w-full text-left px-3 py-2 text-rose-400 hover:bg-rose-500/10 flex items-center gap-2 cursor-pointer border-t border-slate-700/40 transition">
                            <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Sign Out
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="p-4 md:p-6 overflow-y-auto flex-1 max-w-7xl w-full mx-auto">
            <!-- Mobile action bar -->
            <div class="md:hidden mb-4 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-300 uppercase tracking-wider">High Schools</span>
                <button onclick="openSchoolModal()" class="bg-indigo-600 hover:bg-indigo-500 text-xs text-white px-3 py-1.5 rounded-lg font-medium transition flex items-center gap-1.5 cursor-pointer shadow">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add School
                </button>
            </div>
            <div id="schools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-xs">
            </div>
        </main>
    </div>

    <div id="add-school-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-sm p-4 space-y-4 text-xs">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 class="font-bold text-white text-sm">Add High School Node</h3>
                <button onclick="closeSchoolModal()" class="text-slate-400 hover:text-white cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <form id="add-school-form" onsubmit="handleNewSchool(event)" class="space-y-3">
                <div>
                    <label class="block text-slate-400 mb-1">School Campus Photo Image</label>
                    <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-lg border border-slate-700">
                        <div id="school-image-preview" class="w-10 h-10 rounded bg-slate-800 border border-slate-700 overflow-hidden flex items-center justify-center">
                            <i data-lucide="building" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <input type="file" id="s-photo" accept="image/*" onchange="previewSchoolImage(event)" class="text-[11px] text-slate-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700 file:cursor-pointer">
                    </div>
                </div>
                <div><label class="block text-slate-400 mb-1">School Name</label><input type="text" id="s-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                <div><label class="block text-slate-400 mb-1">Physical Address Location</label><input type="text" id="s-address" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                <div class="flex justify-end gap-2 pt-2 border-t border-slate-700">
                    <button type="button" onclick="closeSchoolModal()" class="bg-slate-700 px-3 py-1.5 rounded-lg cursor-pointer">Cancel</button>
                    <button type="submit" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg cursor-pointer">Save School</button>
                </div>
            </form>
        </div>
    </div>

    <div id="view-campus-members-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md shadow-2xl p-5 space-y-4 relative text-xs flex flex-col max-h-[85vh]">
            <button onclick="closeCampusModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer bg-slate-900/40 p-1.5 rounded-lg border border-slate-700/50"><i data-lucide="x" class="w-4 h-4"></i></button>
            
            <div class="border-b border-slate-700/60 pb-2">
                <h3 id="campus-title" class="text-sm font-bold text-white tracking-wide"></h3>
                <p class="text-[10px] text-indigo-400 font-semibold tracking-wider uppercase mt-0.5">Assigned Active Members List</p>
            </div>

            <div id="campus-members-list" class="space-y-2 overflow-y-auto pr-1 flex-1"></div>
            
            <div class="pt-2 border-t border-slate-700 flex justify-end">
                <button onclick="closeCampusModal()" class="bg-slate-900 text-slate-300 font-semibold px-4 py-1.5 rounded-lg hover:bg-slate-700 transition cursor-pointer">Close List</button>
            </div>
        </div>
    </div>

    <script>
        const db = firebase.firestore();

        let schools = [];
        let customSchoolPhotoBase64 = "";
        let inlineTargetSchoolId = null;
        let currentUserRole = ""; // Tracks administrative authorization clearances globally

        document.addEventListener("DOMContentLoaded", () => { 
            listenToCampuses(); 
            listenToAuthSession(); // Run secure role checks on DOM load
        });

        // Verifies credentials via cloud database to assign proper user view states
        function listenToAuthSession() {
            // Build the sidebar layout instantly on load so it never disappears or flickers
            buildSecuredNavigation();

            firebase.auth().onAuthStateChanged(user => {
                const emailContainer = document.getElementById("dropdown-user-email");
                const avatarContainer = document.getElementById("header-profile-avatar");

                if (user) {
                    if (emailContainer) emailContainer.innerText = user.email;

                    db.collection('staff').where("email", "==", user.email).get().then(staffSnapshot => {
                        if (staffSnapshot.empty) {
                            alert("Access Denied! Your email is not registered in the staff database registry.");
                            firebase.auth().signOut().then(() => { window.location.href = "login.html"; });
                            return;
                        }

                        // Extract administrative role context safely
                        let staffData = staffSnapshot.docs[0].data();
                        currentUserRole = staffData.role;

                        // Retrieve authenticated user data photo info to populate upper menu bar context
                        db.collection('members').get().then(snapshot => {
                            let matchedPhoto = "";
                            let matchedInitials = "";
                            snapshot.forEach(doc => {
                                const data = doc.data();
                                if ((data.email && data.email.toLowerCase() === user.email.toLowerCase()) || 
                                    (data.name && user.email.toLowerCase().includes(data.name.split(' ')[0].toLowerCase()))) {
                                    if (data.photo) matchedPhoto = data.photo;
                                    if (data.name) matchedInitials = data.name.charAt(0);
                                }
                            });

                            if (avatarContainer) {
                                if (matchedPhoto) {
                                    avatarContainer.innerHTML = `<img src="${matchedPhoto}" class="w-full h-full object-cover">`;
                                } else if (matchedInitials) {
                                    avatarContainer.innerHTML = matchedInitials;
                                } else {
                                    avatarContainer.innerHTML = (user.email || "U").charAt(0).toUpperCase();
                                }
                            }
                        });

                        // Re-run the navigation builder now that we know the role to filter restricted pages safely
                        buildSecuredNavigation();
                    }).catch(err => {
                        console.error("Authorization snapshot look up failure:", err);
                        window.location.href = "login.html";
                    });
                } else {
                    currentUserRole = "";
                    if (emailContainer) emailContainer.innerText = "No active session";
                    if (avatarContainer) avatarContainer.innerHTML = `<i data-lucide="user" class="w-3 h-3"></i>`;
                    // Route Guard: Send unauthenticated actions away to login page instantly
                    window.location.href = "login.html";
                }
            });
        }

        function listenToCampuses() {
            db.collection('campuses')
              .where('instType', '==', 'high')
              .onSnapshot(snapshot => {
                  schools = [];
                  snapshot.forEach(doc => {
                      schools.push({ id: doc.id, ...doc.data() });
                  });
                  refreshGrid();
              }, err => console.error("Error loading campuses: ", err));
        }

        function openSchoolModal() {
            document.getElementById("add-school-form")?.reset();
            customSchoolPhotoBase64 = "";
            document.getElementById("school-image-preview").innerHTML = `<i data-lucide="building" class="w-5 h-5 text-slate-500"></i>`;
            lucide.createIcons();
            document.getElementById("add-school-modal").classList.remove("hidden");
        }
        
        function closeSchoolModal() { document.getElementById("add-school-modal").classList.add("hidden"); }

        function previewSchoolImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    customSchoolPhotoBase64 = e.target.result;
                    document.getElementById("school-image-preview").innerHTML = `<img src="${customSchoolPhotoBase64}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(file);
            }
        }

        function triggerInlineSchoolPhoto(id, event) {
            event.stopPropagation();
            inlineTargetSchoolId = id;
            document.getElementById("global-school-file-picker").click();
        }

        function handleInlineSchoolPhoto(event) {
            const file = event.target.files[0];
            if (file && inlineTargetSchoolId) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    db.collection('campuses').doc(inlineTargetSchoolId).update({
                        photo: e.target.result
                    }).catch(err => alert("Error updating photo: " + err.message));
                }
                reader.readAsDataURL(file);
            }
        }

        function handleNewSchool(e) {
            e.preventDefault();
            db.collection('campuses').add({
                name: document.getElementById("s-name").value,
                address: document.getElementById("s-address").value,
                photo: customSchoolPhotoBase64,
                instType: "high"
            })
            .then(() => { closeSchoolModal(); e.target.reset(); })
            .catch(err => alert("Error adding school: " + err.message));
        }

        function deleteSchool(id, event) {
            event.stopPropagation();
            if(confirm("Are you sure you want to delete this high school from the registry database?")) {
                db.collection('campuses').doc(id).delete()
                .catch(err => alert("Error deleting school: " + err.message));
            }
        }

        function showCampusMembers(schoolName) {
            document.getElementById("campus-title").innerText = schoolName;
            const container = document.getElementById("campus-members-list");
            container.innerHTML = `<p class="text-slate-400 py-4 text-center">Loading members...</p>`;
            
            document.getElementById("view-campus-members-modal").classList.remove("hidden");

            db.collection('members').where('target', '==', schoolName).get()
            .then(snapshot => {
                container.innerHTML = "";
                if(snapshot.empty) {
                    container.innerHTML = `<p class="text-slate-500 py-4 text-center">No youth members are currently assigned to this campus asset.</p>`;
                    return;
                }
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const avatar = m.photo 
                        ? `<img src="${m.photo}" class="w-7 h-7 rounded-full object-cover">`
                        : `<div class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center font-bold text-white uppercase">${m.name.charAt(0)}</div>`;
                    
                    container.innerHTML += `
                    <div class="flex items-center justify-between bg-slate-900/40 p-2.5 rounded-xl border border-slate-700/40">
                        <div class="flex items-center gap-2.5">
                            ${avatar}
                            <div><p class="font-bold text-white">${m.name}</p><p class="text-[10px] text-slate-400 font-mono mt-0.5">${m.phone || 'N/A'}</p></div>
                        </div>
                    </div>`;
                });
            })
            .catch(err => container.innerHTML = `<p class="text-rose-400 py-4 text-center">Error: ${err.message}</p>`);
        }

        function closeCampusModal() { document.getElementById("view-campus-members-modal").classList.add("hidden"); }

        function refreshGrid() {
            const grid = document.getElementById("schools-grid");
            if (!grid) return;
            grid.innerHTML = "";
            schools.forEach(s => {
                const imgBox = s.photo 
                    ? `<img src="${s.photo}" class="w-full h-full object-cover">`
                    : `<i data-lucide="graduation-cap" class="w-5 h-5 text-indigo-400"></i>`;
                
                grid.innerHTML += `
                <div onclick="showCampusMembers('${s.name}')" class="bg-slate-800 p-4 rounded-xl border border-slate-700/70 flex items-center justify-between shadow-sm hover:border-indigo-500 transition-all duration-200 cursor-pointer group">
                    <div class="flex items-center gap-3">
                        <div class="relative w-11 h-11 bg-indigo-500/10 rounded-lg flex items-center justify-center font-bold text-sm border border-indigo-500/20 shrink-0 overflow-hidden group/avatar">
                            ${imgBox}
                            <div onclick="triggerInlineSchoolPhoto('${s.id}', event)" class="absolute inset-0 bg-slate-950/70 opacity-0 group-hover/avatar:opacity-100 flex items-center justify-center transition duration-150" title="Upload Photo">
                                <i data-lucide="camera" class="w-3.5 h-3.5 text-white"></i>
                            </div>
                        </div>
                        <div><h4 class="font-bold text-white text-sm group-hover:text-indigo-400 transition-colors">${s.name}</h4><p class="text-slate-400 text-[11px] mt-0.5">${s.address}</p></div>
                    </div>
                    <button onclick="deleteSchool('${s.id}', event)" class="text-slate-500 hover:text-rose-400 p-1.5 rounded hover:bg-slate-900/50 transition cursor-pointer"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`;
            });
            lucide.createIcons();
        }

        // Shared universal dynamic template sidebar frame logic injection
        function buildSecuredNavigation() {
            fetch('index.html').then(res => res.text()).then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const mobileSource = doc.querySelector('.md\\:hidden');
                const sidebarSource = doc.querySelector('aside');

                // Strip navigation segments if the current credentials flag matches Creative Arts Leader
                if (currentUserRole === "Creative Arts Leader") {
                    const restrictedPages = ['users.html', 'offerings.html']; 

                    restrictedPages.forEach(page => {
                        const mobileLink = mobileSource.querySelector(`a[href="${page}"]`);
                        const sidebarLink = sidebarSource.querySelector(`a[href="${page}"]`);
                        
                        if (mobileLink) mobileLink.remove();
                        if (sidebarLink) sidebarLink.remove();
                    });
                }

                document.getElementById('mobile-top-bar').innerHTML = mobileSource.innerHTML;
                
                const container = document.getElementById('sidebar-container');
                container.className = sidebarSource.className;
                container.id = "sidebar-menu";
                container.innerHTML = sidebarSource.innerHTML;
                
                // Adjust highlighting classes for links perfectly
                container.querySelectorAll('a').forEach(link => {
                    if (link.getAttribute('href') === 'highschools.html') {
                        link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
                    } else {
                        link.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
                    }
                });
                
                lucide.createIcons();
            });
        }

        
    </script>
<script src="profile-global.js"></script>
</body>
</html>
