<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - High School Mapping Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS & JS Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        .leaflet-popup-content-wrapper { background: #1e293b; color: #f8fafc; border: 1px solid #475569; border-radius: 0.5rem; }
        .leaflet-popup-tip { background: #1e293b; border: 1px solid #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- MOBILE NAVIGATION OVERLAY FRAMES -->
    <div id="mobile-top-bar" class="md:hidden"></div>
    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <!-- Main Layout Header Frame -->
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 hidden md:flex justify-between items-center shrink-0">
            <div class="flex flex-col">
                <h2 class="text-base font-bold text-white tracking-wide">Regional High School Outreach Map</h2>
                <p class="text-[10px] text-slate-400">Targeting outreach networks across Belhar, Delft, and neighboring Cape Town districts</p>
            </div>
            <div class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider">
                Outreach Core Tracker
            </div>
        </header>

        <!-- Main Workspace Map Frame -->
        <main class="p-4 md:p-6 flex-1 flex flex-col overflow-hidden">
            <div class="bg-slate-800 border border-slate-700/70 rounded-xl overflow-hidden shadow-xl flex-1 flex flex-col relative">
                <!-- Map Header Ribbon -->
                <div class="p-3 border-b border-slate-700/70 bg-slate-800/40 flex justify-between items-center shrink-0 z-10">
                    <span class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-1.5">
                        <i data-lucide="map-pin" class="w-3.5 h-3.5 text-indigo-400"></i> Local Institutional Markers
                    </span>
                    <span class="text-[10px] text-emerald-400 font-semibold bg-emerald-500/10 border border-emerald-500/20 px-2 py-0.5 rounded" id="school-counter">
                        8 Schools Placed
                    </span>
                </div>

                <!-- Interactive Map Canvas Element -->
                <div id="high-school-map" class="w-full flex-1 z-0 bg-slate-950"></div>
            </div>
        </main>
    </div>

    <!-- MAIN SYSTEM MAPPING LOGIC ENGINE -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            initHighSchoolMap();
        });

        function initHighSchoolMap() {
            // Centers view directly over the Belhar / Delft borders in Cape Town
            const map = L.map('high-school-map').setView([-33.9535, 18.6120], 13);

            // High-Contrast Light basemap alternative to ensure excellent readability
            L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png', {
                maxZoom: 20,
                attribution: '&copy; <a href="https://stadiamaps.com/">Stadia Maps</a>, &copy; <a href="https://openstreetmap.org">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Geographically accurate coordinates for Schools across Belhar, Delft, and neighboring grids
            const highSchools = [
                { name: "Belhar High School", coords: [-33.9458, 18.6185], desc: "Core community school in Belhar. Active youth network target." },
                { name: "Carlton Van Heerden Secondary", coords: [-33.9412, 18.6090], desc: "Located within the Belhar regional zone." },
                { name: "Symphony High School", coords: [-33.9550, 18.6145], desc: "Bordering Belhar and Delft networks along Symphony Way." },
                { name: "Delft Technical High School", coords: [-33.9740, 18.5912], desc: "Major institutional asset servicing the Delft central community." },
                { name: "Voorbrug Secondary School", coords: [-33.9815, 18.5955], desc: "Established secondary community school situated deep in Delft." },
                { name: "Rosendaal High School", coords: [-33.9680, 18.5990], desc: "Delft regional school network partner." },
                { name: "Excelsior Secondary School", coords: [-33.9350, 18.5980], desc: "Positioned close by in the neighboring Elsies River region." },
                { name: "Bellville High School", coords: [-33.8895, 18.6320], desc: "Wider Cape Town North regional connection point." }
            ];

            // Map custom marker style setup using native canvas layers or pins
            highSchools.forEach(school => {
                const marker = L.marker(school.coords).addTo(map);
                
                const popupContent = `
                    <div class="p-1">
                        <h4 class="font-bold text-indigo-400 text-xs mb-0.5">${school.name}</h4>
                        <p class="text-[10px] text-slate-300 leading-relaxed font-sans">${school.desc}</p>
                        <div class="mt-2 pt-1 border-t border-slate-700/60 text-[9px] text-slate-400 flex items-center gap-1">
                            <i data-lucide="graduation-cap" class="w-3 h-3 text-emerald-400"></i> Cape Town Metro Region
                        </div>
                    </div>
                `;
                
                marker.bindPopup(popupContent);
            });

            // Initialize icons for popups when triggered dynamically
            map.on('popupopen', () => { lucide.createIcons(); });

            // Document metrics update tracking
            document.getElementById("school-counter").innerText = `${highSchools.length} Schools Placed`;
        }

        // Shared universal dynamic template sidebar frame logic injection
        fetch('index.html').then(res => res.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('mobile-top-bar').innerHTML = doc.querySelector('.md\\:hidden').innerHTML;
            const container = document.getElementById('sidebar-container');
            container.className = doc.querySelector('aside').className;
            container.id = "sidebar-menu";
            container.innerHTML = doc.querySelector('aside').innerHTML;
            
            container.querySelector('a[href="index.html"]').className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
            
            const highSchoolLink = container.querySelector('a[href="high-school-map.html"]');
            if(highSchoolLink) {
                highSchoolLink.className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
