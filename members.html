<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Members</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col md:flex-row overflow-hidden">

    <div id="mobile-top-bar" class="md:hidden"></div>
    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 hidden md:flex justify-between items-center shrink-0">
            <h2 class="text-base font-bold text-white tracking-wide">Youth Roster Core Directory</h2>
            <div class="text-[11px] text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded font-medium border border-indigo-500/20">Active Congregation</div>
        </header>

        <main class="p-4 md:p-6 overflow-y-auto flex-1 max-w-7xl w-full mx-auto">
            <section class="bg-slate-800 rounded-xl border border-slate-700/70 overflow-hidden shadow-sm">
                
                <div class="p-4 border-b border-slate-700/70 bg-slate-800/40 flex flex-col xl:flex-row gap-3 justify-between items-center">
                    <div class="flex items-center justify-between w-full xl:w-auto gap-4">
                        <span class="text-xs font-bold text-slate-300 uppercase tracking-wider"> Roster Control</span>
                        <button onclick="toggleSort()" class="bg-slate-900 text-[11px] text-slate-300 px-2.5 py-1.5 border border-slate-700 rounded-lg hover:text-white flex items-center gap-1 cursor-pointer">
                            <i data-lucide="arrow-up-z-a" class="w-3.5 h-3.5"></i> Sort A-Z (<span id="sort-indicator">Asc</span>)
                        </button>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-2 w-full xl:w-auto items-stretch sm:items-center">
                        <input id="search-input" oninput="filterMembers()" type="text" placeholder="Search profiles..." class="bg-slate-900 border border-slate-700 rounded-lg pl-3 pr-3 py-1.5 text-[11px] text-white focus:outline-none">
                        
                        <select id="filter-dept" onchange="filterMembers()" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] text-slate-300 focus:outline-none cursor-pointer">
                            <option value="all">All Arts Sectors</option>
                            <option value="Dance Stars">Dance Stars</option>
                            <option value="Choir">The Choir / Worshipers</option>
                            <option value="Film Stars">Film Stars</option>
                        </select>

                        <select id="filter-attendance" onchange="filterMembers()" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] text-slate-300 focus:outline-none cursor-pointer">
                            <option value="all">All Statuses</option>
                            <option value="Present">Present Only</option>
                            <option value="Absent">Absent Only</option>
                        </select>

                        <button onclick="openAddModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-semibold py-1.5 px-3 rounded-lg transition flex items-center justify-center gap-1.5 cursor-pointer shadow">
                            <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Add Member
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700/60 bg-slate-900/30 text-[10px] uppercase tracking-wider text-slate-400">
                                <th class="py-2.5 px-4 w-[60px]">Avatar</th>
                                <th class="py-2.5 px-4">Youth Profile Name</th>
                                <th class="py-2.5 px-4">Contact</th>
                                <th class="py-2.5 px-4">Creative Sector</th>
                                <th class="py-2.5 px-4">Occupation Context</th>
                                <th class="py-2.5 px-4">Affiliation Mapping</th>
                                <th class="py-2.5 px-4">Roll Call Status</th>
                                <th class="py-2.5 px-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="member-table-body" class="divide-y divide-slate-700/40 text-[11px] text-slate-300">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="add-member-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-md shadow-xl p-4 space-y-3 text-xs overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2">
                <h3 id="modal-title" class="font-bold text-white text-sm flex items-center gap-1.5">
                    <i data-lucide="user-plus" class="text-indigo-400"></i> Register Youth Account
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white cursor-pointer"><i data-lucide="x"></i></button>
            </div>
            
            <form id="add-member-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <input type="hidden" id="edit-index" value="">
                
                <div>
                    <label class="block text-slate-400 mb-0.5">Profile Picture</label>
                    <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-lg border border-slate-700">
                        <div id="image-preview-container" class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 overflow-hidden flex items-center justify-center">
                            <i data-lucide="user" class="w-5 h-5 text-slate-500"></i>
                        </div>
                        <input type="file" id="m-photo" accept="image/*" onchange="previewImage(event)" class="text-[11px] text-slate-400 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-[11px] file:font-semibold file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700 file:cursor-pointer">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Full Name</label><input type="text" id="m-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                    <div><label class="block text-slate-400 mb-0.5">Mobile Phone</label><input type="tel" id="m-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Physical Address</label><input type="text" id="m-address" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                    <div><label class="block text-slate-400 mb-0.5">Date of Birth</label><input type="date" id="m-dob" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Creative Arts Team</label><select id="m-dept" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"><option value="Dance Stars">Dance Stars</option><option value="Choir">The Choir / Worshipers</option><option value="Film Stars">Film Stars</option></select></div>
                    <div><label class="block text-slate-400 mb-0.5">Occupation Status</label><select id="m-occ" onchange="adjustConditionalInputs()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"><option value="High School">High School Student</option><option value="University">University Student</option><option value="College">College Student</option><option value="Work">Employed / Workplace</option></select></div>
                </div>
                
                <div id="conditional-fields" class="p-2.5 bg-slate-900/50 rounded-lg border border-slate-700/50 space-y-2"></div>
                
                <div class="flex justify-end gap-2 pt-2 border-t border-slate-700">
                    <button type="button" onclick="closeModal()" class="bg-slate-700 px-3 py-1.5 rounded-lg cursor-pointer">Cancel</button>
                    <button type="submit" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-medium cursor-pointer">Save System Record</button>
                </div>
            </form>
        </div>
    </div>

    <div id="view-member-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-sm shadow-2xl p-5 space-y-4 relative text-xs">
            <button onclick="closeViewModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white cursor-pointer bg-slate-900/40 p-1.5 rounded-lg border border-slate-700/50"><i data-lucide="x" class="w-4 h-4"></i></button>
            
            <div class="text-center space-y-2 pb-3 border-b border-slate-700/60">
                <div id="view-avatar-box" class="w-16 h-16 rounded-full mx-auto bg-slate-700 border-2 border-indigo-500 overflow-hidden flex items-center justify-center text-xl font-bold uppercase text-white shadow-md"></div>
                <div>
                    <h3 id="view-name" class="text-sm font-bold text-white tracking-wide"></h3>
                    <p id="view-dept" class="text-[10px] text-indigo-400 font-semibold tracking-wider uppercase mt-0.5"></p>
                </div>
            </div>

            <div class="space-y-3">
                <div class="flex items-start gap-2.5">
                    <div class="text-slate-500 mt-0.5"><i data-lucide="phone" class="w-3.5 h-3.5"></i></div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-semibold">Contact Mobile</p>
                        <p id="view-phone" class="text-slate-200 font-mono mt-0.5"></p>
                    </div>
                </div>
                <div class="flex items-start gap-2.5">
                    <div class="text-slate-500 mt-0.5"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i></div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-semibold">Home Address</p>
                        <p id="view-address" class="text-slate-200 mt-0.5"></p>
                    </div>
                </div>
                <div class="flex items-start gap-2.5">
                    <div class="text-slate-500 mt-0.5"><i data-lucide="calendar" class="w-3.5 h-3.5"></i></div>
                    <div>
                        <p class="text-[10px] text-slate-400 uppercase font-semibold">Date of Birth</p>
                        <p id="view-dob" class="text-slate-200 mt-0.5"></p>
                    </div>
                </div>
                <div class="flex items-start gap-2.5 bg-slate-900/40 p-2.5 rounded-xl border border-slate-700/40">
                    <div class="text-indigo-400 mt-0.5"><i data-lucide="briefcase" class="w-3.5 h-3.5"></i></div>
                    <div class="flex-1">
                        <p class="text-[10px] text-slate-400 uppercase font-semibold">Occupation & Affiliation</p>
                        <p id="view-affiliation" class="text-slate-100 font-medium mt-0.5"></p>
                    </div>
                </div>
            </div>
            
            <div class="pt-2 flex justify-center">
                <button onclick="closeViewModal()" class="bg-slate-900 hover:bg-slate-700 border border-slate-700 text-slate-300 font-semibold px-4 py-1.5 rounded-lg transition cursor-pointer">Close Profile</button>
            </div>
        </div>
    </div>

    <script>
        let initialMembers = [
            { id: 1, name: "Thabo Ndlovu", phone: "082 111 2233", address: "Gugulethu, Cape Town", dob: "2008-04-12", dept: "Dance Stars", occ: "High School", target: "Cape Town High School", subData: "", attendance: "Present", photo: "" },
            { id: 2, name: "Sarah Jenkins", phone: "071 444 5566", address: "Rondebosch, Cape Town", dob: "2004-11-23", dept: "Choir", occ: "University", target: "University of Cape Town (UCT)", subData: "BSc Computer Science - Year 3", attendance: "Absent", photo: "" },
            { id: 3, name: "Lwazi Sithole", phone: "063 777 8899", address: "Belhar, Cape Town", dob: "2006-07-02", dept: "Film Stars", occ: "High School", target: "Belhar High School", subData: "", attendance: "Present", photo: "" }
        ];

        let sortAsc = true;
        let currentPhotoBase64 = "";

        document.addEventListener("DOMContentLoaded", () => { 
            adjustConditionalInputs(); 
            renderTable(initialMembers); 
        });

        function openAddModal() {
            document.getElementById("modal-title").innerHTML = `<i data-lucide="user-plus" class="text-indigo-400"></i> Register Youth Account`;
            document.getElementById("edit-index").value = "";
            document.getElementById("add-member-form").reset();
            currentPhotoBase64 = "";
            document.getElementById("image-preview-container").innerHTML = `<i data-lucide="user" class="w-5 h-5 text-slate-500"></i>`;
            lucide.createIcons();
            document.getElementById("add-member-modal").classList.remove("hidden");
            adjustConditionalInputs();
        }

        function closeModal() { document.getElementById("add-member-modal").classList.add("hidden"); }

        function openViewModal(id) {
            const m = initialMembers.find(item => item.id === id);
            if (!m) return;

            document.getElementById("view-name").innerText = m.name;
            document.getElementById("view-dept").innerText = m.dept;
            document.getElementById("view-phone").innerText = m.phone;
            document.getElementById("view-address").innerText = m.address;
            document.getElementById("view-dob").innerText = m.dob;
            
            const affilText = m.subData ? `${m.occ} (${m.target} — ${m.subData})` : `${m.occ} (${m.target})`;
            document.getElementById("view-affiliation").innerText = affilText;

            const avatarBox = document.getElementById("view-avatar-box");
            if (m.photo) {
                avatarBox.innerHTML = `<img src="${m.photo}" class="w-full h-full object-cover">`;
            } else {
                avatarBox.innerHTML = m.name.charAt(0);
            }

            lucide.createIcons();
            document.getElementById("view-member-modal").classList.remove("hidden");
        }

        function closeViewModal() { document.getElementById("view-member-modal").classList.add("hidden"); }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhotoBase64 = e.target.result;
                    document.getElementById("image-preview-container").innerHTML = `<img src="${currentPhotoBase64}" class="w-full h-full object-cover">`;
                }
                reader.readAsDataURL(file);
            }
        }

        function toggleMobileMenu() { document.getElementById("sidebar-menu").classList.toggle("-translate-x-full"); }

        function adjustConditionalInputs() {
            const occ = document.getElementById("m-occ").value;
            const container = document.getElementById("conditional-fields");
            if(occ === "High School") {
                container.innerHTML = `<label class="block text-slate-400 mb-1">Select Registered High School</label><select id="m-target" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300"><option value="Cape Town High School">Cape Town High School</option><option value="Belhar High School">Belhar High School</option></select>`;
            } else if(occ === "University" || occ === "College") {
                container.innerHTML = `<div class="space-y-2"><div><label class="block text-slate-400 mb-1">Select Registered Institute</label><select id="m-target" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300"><option value="University of Cape Town (UCT)">University of Cape Town (UCT)</option><option value="CPUT">CPUT</option></select></div><div class="grid grid-cols-2 gap-2"><div><label class="block text-slate-400 mb-0.5">Course/Major</label><input type="text" id="m-sub1" placeholder="e.g. BSc IT" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div><div><label class="block text-slate-400 mb-0.5">Year</label><input type="number" id="m-sub2" min="1" max="7" placeholder="1" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div></div></div>`;
            } else {
                container.innerHTML = `<div><label class="block text-slate-400 mb-1">Designated Workplace / Company Name</label><input type="text" id="m-target" placeholder="e.g. Standard Bank" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div>`;
            }
        }

        function updateAttendanceStatus(memberId, selectElement) {
            const newStatus = selectElement.value;
            const member = initialMembers.find(m => m.id === memberId);
            if (member) member.attendance = newStatus;
            
            if (newStatus === "Present") {
                selectElement.className = "bg-emerald-500/10 text-emerald-400 font-bold border border-emerald-500/30 rounded px-1 py-0.5 text-[10px] focus:outline-none cursor-pointer";
            } else {
                selectElement.className = "bg-rose-500/10 text-rose-400 font-bold border border-rose-500/30 rounded px-1 py-0.5 text-[10px] focus:outline-none cursor-pointer";
            }
        }

        function renderTable(data) {
            const body = document.getElementById("member-table-body"); 
            body.innerHTML = "";
            
            data.forEach((m) => {
                const isPresent = m.attendance === "Present";
                const badgeClass = isPresent ? "bg-emerald-500/10 text-emerald-400 font-bold border border-emerald-500/30" : "bg-rose-500/10 text-rose-400 font-bold border border-rose-500/30";

                const avatarImg = m.photo 
                    ? `<img src="${m.photo}" onclick="openViewModal(${m.id})" class="w-7 h-7 rounded-full object-cover border border-slate-700 cursor-pointer hover:border-indigo-400 transition">`
                    : `<div onclick="openViewModal(${m.id})" class="w-7 h-7 rounded-full bg-slate-700 flex items-center justify-center text-slate-300 font-bold uppercase cursor-pointer hover:bg-slate-600 transition">${m.name.charAt(0)}</div>`;

                body.innerHTML += `
                <tr class="hover:bg-slate-700/20">
                    <td class="py-2 px-4">${avatarImg}</td>
                    <td class="py-2 px-4 font-semibold text-white">
                        <div onclick="openViewModal(${m.id})" class="cursor-pointer hover:text-indigo-400 hover:underline transition">${m.name}</div>
                        <div class="text-[9px] text-slate-500 font-normal">DOB: ${m.dob}</div>
                    </td>
                    <td class="py-2 px-4 font-mono">${m.phone}</td>
                    <td class="py-2 px-4 text-indigo-400 font-medium">${m.dept}</td>
                    <td class="py-2 px-4"><span class="bg-slate-900 px-2 py-0.5 rounded border border-slate-700/60 text-slate-300 font-medium">${m.occ}</span></td>
                    <td class="py-2 px-4"><div class="font-medium text-slate-200">${m.target}</div></td>
                    
                    <td class="py-2 px-4">
                        <select onchange="updateAttendanceStatus(${m.id}, this)" class="${badgeClass} rounded px-1 py-0.5 text-[10px] focus:outline-none cursor-pointer">
                            <option value="Present" ${isPresent ? 'selected' : ''}>Present</option>
                            <option value="Absent" ${!isPresent ? 'selected' : ''}>Absent</option>
                        </select>
                    </td>

                    <td class="py-2 px-4 text-right space-x-1">
                        <button onclick="editMember(${m.id})" class="text-indigo-400 hover:text-white p-1 rounded hover:bg-slate-700 transition cursor-pointer"><i data-lucide="edit-3" class="w-3.5 h-3.5 inline"></i></button>
                        <button onclick="deleteMember(${m.id})" class="text-rose-400 hover:text-rose-300 p-1 rounded hover:bg-slate-700 transition cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5 inline"></i></button>
                    </td>
                </tr>`;
            });
            lucide.createIcons();
        }

        function filterMembers() {
            const query = document.getElementById("search-input").value.toLowerCase();
            const dept = document.getElementById("filter-dept").value;
            const status = document.getElementById("filter-attendance").value;
            
            let filtered = initialMembers.filter(m => {
                const matchesSearch = m.name.toLowerCase().includes(query) || m.target.toLowerCase().includes(query);
                const matchesDept = (dept === "all" || m.dept === dept);
                const matchesStatus = (status === "all" || m.attendance === status);
                return matchesSearch && matchesDept && matchesStatus;
            });
            
            filtered.sort((a,b) => sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            renderTable(filtered);
        }

        function toggleSort() { sortAsc = !sortAsc; document.getElementById("sort-indicator").innerText = sortAsc ? "Asc" : "Desc"; filterMembers(); }

        function editMember(id) {
            const m = initialMembers.find(item => item.id === id);
            if(!m) return;

            document.getElementById("modal-title").innerHTML = `<i data-lucide="edit-3" class="text-indigo-400"></i> Update Member Record`;
            document.getElementById("edit-index").value = id;
            document.getElementById("m-name").value = m.name;
            document.getElementById("m-phone").value = m.phone;
            document.getElementById("m-address").value = m.address;
            document.getElementById("m-dob").value = m.dob;
            document.getElementById("m-dept").value = m.dept;
            document.getElementById("m-occ").value = m.occ;
            
            adjustConditionalInputs();
            document.getElementById("m-target").value = m.target;
            
            if((m.occ === "University" || m.occ === "College") && m.subData) {
                const parts = m.subData.split(" - Year ");
                if(parts[0]) document.getElementById("m-sub1").value = parts[0];
                if(parts[1]) document.getElementById("m-sub2").value = parts[1];
            }

            currentPhotoBase64 = m.photo;
            if(m.photo) {
                document.getElementById("image-preview-container").innerHTML = `<img src="${m.photo}" class="w-full h-full object-cover">`;
            } else {
                document.getElementById("image-preview-container").innerHTML = `<i data-lucide="user" class="w-5 h-5 text-slate-500"></i>`;
            }
            lucide.createIcons();
            document.getElementById("add-member-modal").classList.remove("hidden");
        }

        function deleteMember(id) {
            if(confirm("Are you sure you want to permanently remove this profile record?")) {
                initialMembers = initialMembers.filter(m => m.id !== id);
                filterMembers();
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const idValue = document.getElementById("edit-index").value;
            const occ = document.getElementById("m-occ").value;
            
            let subData = "";
            if(occ === "University" || occ === "College") {
                subData = `${document.getElementById("m-sub1").value} - Year ${document.getElementById("m-sub2").value}`;
            }

            if(idValue) {
                const member = initialMembers.find(m => m.id == idValue);
                if(member) {
                    member.name = document.getElementById("m-name").value;
                    member.phone = document.getElementById("m-phone").value;
                    member.address = document.getElementById("m-address").value;
                    member.dob = document.getElementById("m-dob").value;
                    member.dept = document.getElementById("m-dept").value;
                    member.occ = occ;
                    member.target = document.getElementById("m-target").value;
                    member.subData = subData;
                    member.photo = currentPhotoBase64;
                }
            } else {
                initialMembers.unshift({
                    id: Date.now(),
                    name: document.getElementById("m-name").value,
                    phone: document.getElementById("m-phone").value,
                    address: document.getElementById("m-address").value,
                    dob: document.getElementById("m-dob").value,
                    dept: document.getElementById("m-dept").value,
                    occ: occ,
                    target: document.getElementById("m-target").value,
                    subData: subData,
                    attendance: "Present",
                    photo: currentPhotoBase64
                });
            }
            filterMembers(); closeModal(); e.target.reset();
        }

        fetch('index.html').then(res => res.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('mobile-top-bar').innerHTML = doc.querySelector('.md\\:hidden').innerHTML;
            const container = document.getElementById('sidebar-container');
            container.className = doc.querySelector('aside').className;
            container.id = "sidebar-menu";
            container.innerHTML = doc.querySelector('aside').innerHTML;
