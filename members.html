<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Glorious Church - Members</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex overflow-hidden">

    <aside id="sidebar-container"></aside>

    <div class="flex-1 h-screen flex flex-col overflow-hidden">
        <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center shrink-0">
            <h2 class="text-base font-bold text-white tracking-wide">Youth Roster Core Directory</h2>
            <div class="text-[11px] text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded font-medium border border-indigo-500/20">Active Congregation</div>
        </header>

        <main class="p-6 overflow-y-auto flex-1 max-w-7xl w-full mx-auto">
            <section class="bg-slate-800 rounded-xl border border-slate-700/70 overflow-hidden shadow-sm">
                <div class="p-4 border-b border-slate-700/70 bg-slate-800/40 flex flex-col xl:flex-row gap-3 justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-bold text-slate-300 uppercase tracking-wider"> Roster Control</span>
                        <button onclick="toggleSort()" class="bg-slate-900 text-[11px] text-slate-300 px-2.5 py-1.5 border border-slate-700 rounded-lg hover:text-white flex items-center gap-1 cursor-pointer">
                            <i data-lucide="arrow-up-z-a" class="w-3.5 h-3.5"></i> Sort A-Z (<span id="sort-indicator">Asc</span>)
                        </button>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-2 w-full xl:w-auto items-stretch sm:items-center">
                        <input id="search-input" oninput="filterMembers()" type="text" placeholder="Search profiles..." class="bg-slate-900 border border-slate-700 rounded-lg pl-3 pr-3 py-1.5 text-[11px] text-white focus:outline-none">
                        
                        <select id="filter-dept" onchange="filterMembers()" class="bg-slate-900 border border-slate-700 rounded-lg px-2 py-1.5 text-[11px] text-slate-300 focus:outline-none cursor-pointer">
                            <option value="all">All Arts Sectors</option>
                            <option value="Dance Stars">Dance Stars</option>
                            <option value="Choir">The Choir / Worshipers</option>
                            <option value="Film Stars">Film Stars</option>
                        </select>

                        <button onclick="toggleModal(true)" class="bg-indigo-600 hover:bg-indigo-500 text-white text-[11px] font-semibold py-1.5 px-3 rounded-lg transition flex items-center justify-center gap-1.5 cursor-pointer shadow">
                            <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Add New Member
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-slate-700/60 bg-slate-900/30 text-[10px] uppercase tracking-wider text-slate-400">
                                <th class="py-2.5 px-4">Youth Profile Name</th>
                                <th class="py-2.5 px-4">Contact Contact</th>
                                <th class="py-2.5 px-4">Creative Sector</th>
                                <th class="py-2.5 px-4">Occupation Tier Context</th>
                                <th class="py-2.5 px-4">Institutional Affiliation Mapping</th>
                            </tr>
                        </thead>
                        <tbody id="member-table-body" class="divide-y divide-slate-700/40 text-[11px] text-slate-300">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="add-member-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-xl w-full max-w-md shadow-xl p-4 space-y-3 text-xs overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2"><h3 class="font-bold text-white text-sm flex items-center gap-1.5"><i data-lucide="user-plus" class="text-indigo-400"></i> Register Youth Account</h3><button onclick="toggleModal(false)" class="text-slate-400 hover:text-white cursor-pointer"><i data-lucide="x"></i></button></div>
            <form id="add-member-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Full Name</label><input type="text" id="m-name" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                    <div><label class="block text-slate-400 mb-0.5">Mobile Phone</label><input type="tel" id="m-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Physical Address</label><input type="text" id="m-address" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white focus:outline-none"></div>
                    <div><label class="block text-slate-400 mb-0.5">Date of Birth</label><input type="date" id="m-dob" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"></div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="block text-slate-400 mb-0.5">Creative Arts Team</label><select id="m-dept" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"><option value="Dance Stars">Dance Stars</option><option value="Choir">The Choir / Worshipers</option><option value="Film Stars">Film Stars</option></select></div>
                    <div><label class="block text-slate-400 mb-0.5">Occupation Status</label><select id="m-occ" onchange="adjustConditionalInputs()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300 focus:outline-none"><option value="High School">High School Student</option><option value="University">University Student</option><option value="College">College Student</option><option value="Work">Employed / Workplace</option></select></div>
                </div>
                
                <div id="conditional-fields" class="p-2.5 bg-slate-900/50 rounded-lg border border-slate-700/50 space-y-2">
                    </div>

                <div class="flex justify-end gap-2 pt-2 border-t border-slate-700"><button type="button" onclick="toggleModal(false)" class="bg-slate-700 px-3 py-1.5 rounded-lg cursor-pointer">Cancel</button><button type="submit" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg font-medium cursor-pointer">Confirm Member</button></div>
            </form>
        </div>
    </div>

    <script>
        let initialMembers = [
            { name: "Thabo Ndlovu", phone: "082 111 2233", address: "Gugulethu, Cape Town", dob: "2008-04-12", dept: "Dance Stars", occ: "High School", target: "Cape Town High School", subData: "" },
            { name: "Sarah Jenkins", phone: "071 444 5566", address: "Rondebosch, Cape Town", dob: "2004-11-23", dept: "Choir", occ: "University", target: "University of Cape Town (UCT)", subData: "BSc Computer Science - Year 3" },
            { name: "Lwazi Sithole", phone: "063 777 8899", address: "Belhar, Cape Town", dob: "2006-07-02", dept: "Film Stars", occ: "High School", target: "Belhar High School", subData: "" }
        ];

        let sortAsc = true;

        document.addEventListener("DOMContentLoaded", () => { adjustConditionalInputs(); renderTable(initialMembers); });
        function toggleModal(show) { document.getElementById("add-member-modal").classList.toggle("hidden", !show); if(show) adjustConditionalInputs(); }

        function adjustConditionalInputs() {
            const occ = document.getElementById("m-occ").value;
            const container = document.getElementById("conditional-fields");
            const highschools = JSON.parse(localStorage.getItem('church-highschools')) || [];
            const campuses = JSON.parse(localStorage.getItem('church-campuses')) || [];

            if(occ === "High School") {
                container.innerHTML = `
                    <label class="block text-slate-400 mb-1">Select Registered High School</label>
                    <select id="m-target" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300">
                        ${highschools.map(s => `<option value="${s.name}">${s.name}</option>`).join('') || '<option value="None">No schools available. Add one first.</option>'}
                    </select>`;
            } else if(occ === "University" || occ === "College") {
                const subset = campuses.filter(c => c.type === occ);
                container.innerHTML = `
                    <div class="space-y-2">
                        <div>
                            <label class="block text-slate-400 mb-1">Select Registered Institute</label>
                            <select id="m-target" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-slate-300">
                                ${subset.map(c => `<option value="${c.name}">${c.name}</option>`).join('') || `<option value="None">No ${occ} structures defined.</option>`}
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><label class="block text-slate-400 mb-0.5">${occ === 'University' ? 'Degree/Major' : 'Enrolled Course'}</label><input type="text" id="m-sub1" placeholder="e.g. BCom Accounting" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div>
                            <div><label class="block text-slate-400 mb-0.5">Current Study Year</label><input type="number" id="m-sub2" min="1" max="7" placeholder="1" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `<div><label class="block text-slate-400 mb-1">Designated Workplace / Company Name</label><input type="text" id="m-target" placeholder="e.g. Standard Bank Corporate" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-white"></div>`;
            }
        }

        function renderTable(data) {
            const body = document.getElementById("member-table-body"); body.innerHTML = "";
            data.forEach(m => {
                body.innerHTML += `
                <tr class="hover:bg-slate-700/20">
                    <td class="py-2.5 px-4 font-semibold text-white">
                        <div>${m.name}</div><div class="text-[9px] text-slate-500 font-normal">DOB: ${m.dob} | ${m.address}</div>
                    </td>
                    <td class="py-2.5 px-4 font-mono">${m.phone}</td>
                    <td class="py-2.5 px-4 text-indigo-400 font-medium">${m.dept}</td>
                    <td class="py-2.5 px-4"><span class="bg-slate-900 px-2 py-0.5 rounded border border-slate-700/60 text-slate-300 font-medium">${m.occ}</span></td>
                    <td class="py-2.5 px-4">
                        <div class="font-medium text-slate-200">${m.target}</div>
                        ${m.subData ? `<div class="text-[10px] text-slate-400 mt-0.5">${m.subData}</div>` : ''}
                    </td>
                </tr>`;
            });
        }

        function filterMembers() {
            const query = document.getElementById("search-input").value.toLowerCase();
            const dept = document.getElementById("filter-dept").value;
            let filtered = initialMembers.filter(m => (m.name.toLowerCase().includes(query) || m.target.toLowerCase().includes(query)) && (dept === "all" || m.dept === dept));
            
            filtered.sort((a,b) => sortAsc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
            renderTable(filtered);
        }

        function toggleSort() {
            sortAsc = !sortAsc;
            document.getElementById("sort-indicator").innerText = sortAsc ? "Asc" : "Desc";
            filterMembers();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const occ = document.getElementById("m-occ").value;
            let subData = "";
            if(occ === "University" || occ === "College") {
                subData = `${document.getElementById("m-sub1").value} - Year ${document.getElementById("m-sub2").value}`;
            }
            initialMembers.unshift({
                name: document.getElementById("m-name").value,
                phone: document.getElementById("m-phone").value,
                address: document.getElementById("m-address").value,
                dob: document.getElementById("m-dob").value,
                dept: document.getElementById("m-dept").value,
                occ: occ,
                target: document.getElementById("m-target").value,
                subData: subData
            });
            filterMembers(); toggleModal(false); e.target.reset();
        }

        fetch('index.html').then(res => res.text()).then(html => {
            const container = document.getElementById('sidebar-container');
            container.className = "w-64 bg-slate-950 border-r border-slate-800 h-screen sticky top-0 left-0 z-40 flex flex-col justify-between shrink-0";
            container.innerHTML = new DOMParser().parseFromString(html, 'text/html').querySelector('aside').innerHTML;
            container.querySelector('a[href="index.html"]').className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-slate-400 hover:bg-slate-800/60 hover:text-white font-medium transition";
            container.querySelector('a[href="members.html"]').className = "w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-white bg-indigo-600 font-medium transition";
            lucide.createIcons();
        });
    </script>
</body>
</html>
